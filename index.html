<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondation SCP — Site-95</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rouge: #8b0000;
            --rouge-vif: #cc0000;
            --noir: #0a0a0a;
            --gris-fonce: #111111;
            --gris-moyen: #1a1a1a;
            --gris-clair: #2a2a2a;
            --texte: #c8c8c8;
            --texte-clair: #e8e8e8;
            --accent: #ff3333;
            --vert: #00ff41;
            --jaune: #ffd700;
            --bleu: #0044cc;
        }

        body {
            background: var(--noir);
            color: var(--texte);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-y: scroll;
        }

        /* ===== PAGES ===== */
        .page { display: none; min-height: calc(100vh - 140px); }
        .page.active { display: block; }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #0d0d0d, #1a0000);
            border-bottom: 2px solid var(--rouge);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(139,0,0,0.4);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 40px;
        }

        .logo-section { display: flex; align-items: center; gap: 15px; }

        .scp-logo {
            width: 60px; height: 60px;
            border: 3px solid var(--rouge);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold;
            color: var(--rouge-vif);
            text-shadow: 0 0 10px var(--rouge);
            animation: glow 3s infinite;
            background: radial-gradient(circle, #1a0000, #000);
            cursor: pointer;
        }

        @keyframes glow {
            0%,100% { box-shadow: 0 0 5px var(--rouge); }
            50% { box-shadow: 0 0 20px var(--rouge), 0 0 40px rgba(139,0,0,0.3); }
        }

        .header-title h1 { font-size: 20px; color: var(--texte-clair); letter-spacing: 4px; }
        .header-title p { font-size: 10px; color: var(--rouge-vif); letter-spacing: 5px; margin-top: 2px; }

        .header-right { display: flex; align-items: center; gap: 15px; }

        .status-online { color: var(--vert); font-size: 11px; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .admin-btn {
            padding: 6px 14px; font-size: 10px;
            letter-spacing: 2px; font-family: inherit;
            cursor: pointer; background: transparent;
            border: 1px solid rgba(139,0,0,0.5);
            color: rgba(200,200,200,0.5);
            transition: all 0.3s; text-transform: uppercase;
        }
        .admin-btn:hover { border-color: var(--rouge-vif); color: var(--accent); }
        .admin-btn.logged { border-color: var(--vert); color: var(--vert); }

        nav {
            background: rgba(139,0,0,0.1);
            border-top: 1px solid rgba(139,0,0,0.3);
            padding: 0 40px;
            display: flex; overflow-x: auto;
        }

        nav a {
            color: var(--texte); text-decoration: none;
            padding: 10px 18px; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase;
            border-right: 1px solid rgba(139,0,0,0.2);
            transition: all 0.3s; white-space: nowrap;
            cursor: pointer; border-bottom: 3px solid transparent;
            user-select: none;
        }

        nav a:hover { background: rgba(139,0,0,0.2); color: var(--accent); }
        nav a.active { color: var(--accent); border-bottom-color: var(--rouge-vif); background: rgba(139,0,0,0.2); }

        .ticker {
            background: var(--rouge); padding: 5px 0;
            overflow: hidden; white-space: nowrap;
        }
        .ticker-inner {
            display: inline-block;
            animation: ticker 35s linear infinite;
            font-size: 10px; letter-spacing: 2px; color: white;
        }
        @keyframes ticker { 0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)} }

        /* ===== CONTAINER ===== */
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }

        /* ===== SECTION TITLE ===== */
        .section-title {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 25px; padding-bottom: 10px;
            border-bottom: 1px solid rgba(139,0,0,0.4);
        }
        .section-title h2 { font-size: 15px; color: var(--texte-clair); letter-spacing: 4px; text-transform: uppercase; }
        .section-title .line { flex:1; height:1px; background: linear-gradient(90deg, rgba(139,0,0,0.5), transparent); }

        /* ===== BOUTONS ===== */
        .btn {
            padding: 8px 18px; font-size: 11px;
            letter-spacing: 2px; font-family: inherit;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; border: none;
        }
        .btn-primary { background: var(--rouge); border: 1px solid var(--rouge-vif); color: white; }
        .btn-primary:hover { background: var(--rouge-vif); box-shadow: 0 0 15px rgba(204,0,0,0.4); }
        .btn-secondary { background: transparent; border: 1px solid rgba(200,200,200,0.2); color: var(--texte); }
        .btn-secondary:hover { border-color: var(--rouge); color: var(--accent); }
        .btn-danger { background: transparent; border: 1px solid #550000; color: #ff4444; }
        .btn-danger:hover { background: rgba(100,0,0,0.3); }
        .btn-success { background: transparent; border: 1px solid #005500; color: #00cc00; }
        .btn-success:hover { background: rgba(0,100,0,0.3); }
        .btn-sm { padding: 4px 10px; font-size: 10px; }
        .btn-xs { padding: 2px 8px; font-size: 9px; }

        /* ===== FORMULAIRES ===== */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; font-size: 10px;
            letter-spacing: 2px; color: var(--rouge-vif);
            margin-bottom: 6px; text-transform: uppercase;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%; padding: 10px 12px;
            background: var(--gris-fonce);
            border: 1px solid rgba(139,0,0,0.3);
            color: var(--texte-clair);
            font-family: inherit; font-size: 12px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none; border-color: var(--rouge-vif);
            box-shadow: 0 0 10px rgba(204,0,0,0.2);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group select option { background: var(--gris-fonce); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none; position: fixed;
            inset: 0; background: rgba(0,0,0,0.85);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--gris-moyen);
            border: 1px solid var(--rouge);
            border-top: 4px solid var(--rouge-vif);
            max-width: 600px; width: 92%;
            max-height: 85vh; overflow-y: auto;
            padding: 30px; position: relative;
        }
        .modal h2 { font-size: 16px; letter-spacing: 3px; color: var(--texte-clair); margin-bottom: 20px; }
        .modal-close {
            position: absolute; top: 15px; right: 15px;
            background: none; border: 1px solid rgba(255,255,255,0.2);
            color: var(--texte); cursor: pointer;
            padding: 5px 12px; font-family: inherit;
            font-size: 12px; transition: all 0.2s;
        }
        .modal-close:hover { border-color: var(--rouge); color: var(--accent); }

        /* ===== BADGES ===== */
        .badge { display: inline-block; padding: 2px 8px; font-size: 10px; font-weight: bold; letter-spacing: 1px; border-radius: 2px; }
        .badge-safe { background: #003300; color: #00ff00; border: 1px solid #005500; }
        .badge-euclid { background: #333300; color: #ffff00; border: 1px solid #555500; }
        .badge-keter { background: #330000; color: #ff4444; border: 1px solid #550000; }
        .badge-thaumiel { background: #000033; color: #4444ff; border: 1px solid #000055; }
        .badge-apollyon { background: #220000; color: #ff0000; border: 1px solid #ff0000; }
        .badge-neutralized { background: #222; color: #aaa; border: 1px solid #333; }
        .badge-n1 { background: rgba(0,100,0,0.3); color: #00cc00; border: 1px solid #005500; }
        .badge-n2 { background: rgba(0,80,100,0.3); color: #00ccff; border: 1px solid #005566; }
        .badge-n3 { background: rgba(100,80,0,0.3); color: #ffcc00; border: 1px solid #665500; }
        .badge-n4 { background: rgba(100,40,0,0.3); color: #ff8800; border: 1px solid #663300; }
        .badge-n5 { background: rgba(100,0,0,0.3); color: #ff4444; border: 1px solid #660000; }

        /* ===== CARDS ===== */
        .card {
            background: var(--gris-moyen);
            border: 1px solid rgba(139,0,0,0.2);
            border-top: 3px solid var(--rouge);
            padding: 20px; transition: all 0.3s;
        }
        .card:hover { border-color: rgba(204,0,0,0.4); box-shadow: 0 0 15px rgba(139,0,0,0.15); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; }

        /* ===== HERO ===== */
        .hero {
            background: linear-gradient(135deg, rgba(139,0,0,0.1), rgba(0,0,0,0.5));
            border: 1px solid rgba(139,0,0,0.3);
            border-top: 3px solid var(--rouge-vif);
            padding: 35px; margin-bottom: 30px;
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: 'SCP';
            position: absolute; right: -10px; top: 50%;
            transform: translateY(-50%);
            font-size: 110px; font-weight: bold;
            color: rgba(139,0,0,0.04); pointer-events: none;
        }
        .hero h2 { font-size: 22px; letter-spacing: 5px; color: var(--texte-clair); margin-bottom: 8px; }
        .hero p { font-size: 12px; opacity: 0.8; line-height: 1.8; max-width: 700px; }

        /* ===== STATS BAR ===== */
        .stats-bar { display: grid; grid-template-columns: repeat(5,1fr); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.2); padding: 15px; text-align: center; }
        .stat-box .number { font-size: 26px; font-weight: bold; color: var(--rouge-vif); }
        .stat-box .label { font-size: 10px; color: rgba(200,200,200,0.4); letter-spacing: 2px; margin-top: 4px; }

        /* ===== ALERT BOX ===== */
        .alert-box {
            background: rgba(139,0,0,0.1);
            border: 1px solid rgba(139,0,0,0.4);
            border-left: 4px solid var(--rouge-vif);
            padding: 12px 18px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 12px; font-size: 12px;
        }

        /* ===== PERSONNEL ===== */
        .personnel-toolbar {
            display: flex; gap: 10px; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .personnel-toolbar input, .personnel-toolbar select {
            padding: 8px 12px; background: var(--gris-fonce);
            border: 1px solid rgba(139,0,0,0.3);
            color: var(--texte); font-family: inherit; font-size: 11px;
        }
        .personnel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 15px; }

        .personnel-card {
            background: var(--gris-moyen);
            border: 1px solid rgba(139,0,0,0.2);
            transition: all 0.3s; overflow: hidden;
        }
        .personnel-card:hover { border-color: var(--rouge); box-shadow: 0 0 15px rgba(139,0,0,0.2); }

        .personnel-card-header {
            padding: 15px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }
        .avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold;
            border: 2px solid rgba(139,0,0,0.4);
            background: var(--gris-fonce); flex-shrink: 0;
            color: var(--rouge-vif); text-transform: uppercase;
        }
        .personnel-info h3 { font-size: 13px; color: var(--texte-clair); margin-bottom: 3px; }
        .personnel-info .role { font-size: 10px; color: rgba(200,200,200,0.5); letter-spacing: 1px; }
        .personnel-card-body { padding: 12px 15px; }
        .detail { font-size: 11px; margin-bottom: 6px; display: flex; gap: 8px; align-items: flex-start; }
        .detail .key { color: rgba(200,200,200,0.4); min-width: 90px; font-size: 10px; flex-shrink: 0; }
        .detail .val { color: var(--texte); }
        .personnel-card-footer {
            padding: 10px 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; gap: 8px; justify-content: flex-end;
            background: rgba(0,0,0,0.1);
        }

        /* ===== DÉPARTEMENTS ===== */
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 20px; }
        .dept-card { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.2); overflow: hidden; transition: all 0.3s; }
        .dept-card:hover { border-color: rgba(204,0,0,0.4); }
        .dept-header { padding: 18px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .dept-icon { width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .dept-header-text h3 { font-size: 13px; color: var(--texte-clair); letter-spacing: 2px; margin-bottom: 3px; }
        .dept-header-text .dept-code { font-size: 10px; color: rgba(200,200,200,0.4); letter-spacing: 2px; }
        .dept-expand-btn { margin-left: auto; background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--texte); cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.3s; flex-shrink: 0; }
        .dept-body { padding: 0 20px; border-top: 1px solid rgba(255,255,255,0.04); max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s; }
        .dept-body.open { max-height: 600px; padding: 15px 20px 20px; }
        .dept-body p { font-size: 11px; opacity: 0.75; line-height: 1.8; margin-bottom: 12px; }
        .dept-missions h4 { font-size: 10px; color: var(--rouge-vif); letter-spacing: 2px; margin-bottom: 8px; }
        .dept-missions ul { list-style: none; }
        .dept-missions ul li { font-size: 11px; opacity: 0.7; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; gap: 8px; }
        .dept-missions ul li::before { content: '▶'; font-size: 7px; color: var(--rouge-vif); flex-shrink: 0; }
        .dept-stats { display: flex; gap: 10px; margin-top: 12px; }
        .dept-stat-item { flex:1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.04); padding: 8px; text-align: center; }
        .dept-stat-item .n { font-size: 18px; font-weight: bold; color: var(--rouge-vif); }
        .dept-stat-item .l { font-size: 9px; color: rgba(200,200,200,0.3); letter-spacing: 1px; margin-top: 2px; }

        /* ===== ZONES ===== */
        .zone-hero { padding: 25px; margin-bottom: 20px; border-top: 3px solid; position: relative; overflow: hidden; }
        .zone-hero h2 { font-size: 20px; letter-spacing: 6px; margin-bottom: 5px; }
        .zone-hero p { font-size: 11px; opacity: 0.7; line-height: 1.8; max-width: 650px; }
        .zone-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .zone-info-box { background: rgba(0,0,0,0.3); border-left: 3px solid; padding: 15px; }
        .zone-info-box h4 { font-size: 10px; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }
        .zone-info-box p, .zone-info-box li { font-size: 11px; opacity: 0.7; line-height: 1.8; }
        .zone-info-box ul { padding-left: 15px; }
        .zones-nav { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .zone-tab { padding: 8px 18px; font-size: 11px; letter-spacing: 2px; font-family: inherit; cursor: pointer; background: transparent; border: 1px solid rgba(139,0,0,0.3); color: rgba(200,200,200,0.5); transition: all 0.3s; text-transform: uppercase; }
        .zone-tab.active, .zone-tab:hover { border-color: var(--rouge-vif); color: var(--texte-clair); background: rgba(139,0,0,0.2); }
        .zone-content { display: none; }
        .zone-content.active { display: block; }

        /* ===== TABLE ===== */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        thead tr { background: rgba(139,0,0,0.25); border-bottom: 2px solid var(--rouge); }
        thead th { padding: 10px 15px; text-align: left; letter-spacing: 2px; color: var(--texte-clair); font-size: 10px; }
        tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.2s; }
        tbody tr:hover { background: rgba(139,0,0,0.06); }
        tbody td { padding: 9px 15px; color: var(--texte); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--gris-moyen); border: 1px solid var(--rouge);
            border-left: 4px solid var(--rouge-vif);
            padding: 12px 20px; font-size: 12px;
            z-index: 99999; opacity: 0;
            transform: translateY(20px); transition: all 0.3s;
            max-width: 320px; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { border-left-color: #00cc00; }
        .toast.warning { border-left-color: #ffcc00; }

        /* ===== LOGIN MODAL ===== */
        .login-modal {
            background: var(--gris-moyen);
            border: 1px solid var(--rouge);
            border-top: 4px solid var(--rouge-vif);
            max-width: 400px; width: 92%;
            padding: 30px; position: relative;
        }
        .login-modal h2 { font-size: 14px; letter-spacing: 3px; color: var(--texte-clair); margin-bottom: 5px; }
        .login-modal p { font-size: 10px; color: rgba(200,200,200,0.4); letter-spacing: 2px; margin-bottom: 20px; }
        .login-error { color: #ff4444; font-size: 11px; margin-top: 10px; display: none; }

        /* ===== CREDITS ===== */
        .credits-bar {
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(139,0,0,0.2);
            padding: 8px 40px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 10px; color: rgba(200,200,200,0.2); letter-spacing: 1px;
        }

        /* ===== ADMIN BADGE ===== */
        .admin-tag {
            background: rgba(139,0,0,0.3); color: var(--rouge-vif);
            border: 1px solid var(--rouge); padding: 2px 8px;
            font-size: 9px; letter-spacing: 2px; margin-left: 5px;
        }

        /* ===== SCP CARD ===== */
        .scp-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .scp-number { font-size: 20px; font-weight: bold; color: var(--rouge-vif); letter-spacing: 2px; }
        .scp-card h3 { font-size: 13px; color: var(--texte-clair); margin-bottom: 6px; letter-spacing: 1px; }
        .scp-card p { font-size: 11px; opacity: 0.7; line-height: 1.6; margin-bottom: 12px; }
        .scp-card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; font-size: 10px; color: rgba(200,200,200,0.3); }

        /* ===== PROTOCOLES ===== */
        .proto-card { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.2); border-left: 4px solid var(--rouge); padding: 20px; margin-bottom: 15px; }
        .proto-card h3 { font-size: 13px; color: var(--texte-clair); letter-spacing: 2px; margin-bottom: 8px; }
        .proto-card p { font-size: 11px; opacity: 0.7; line-height: 1.7; }
        .proto-meta { display: flex; gap: 15px; margin-top: 12px; font-size: 10px; color: rgba(200,200,200,0.3); }

        /* ===== INCIDENTS ===== */
        .incident-item { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.2); border-left: 4px solid; padding: 18px; margin-bottom: 12px; }
        .incident-item.critique { border-left-color: #ff0000; }
        .incident-item.majeur { border-left-color: #ff8800; }
        .incident-item.mineur { border-left-color: #ffcc00; }
        .incident-item.resolu { border-left-color: #00cc00; }
        .incident-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .incident-header h3 { font-size: 13px; color: var(--texte-clair); letter-spacing: 1px; }
        .incident-item p { font-size: 11px; opacity: 0.7; line-height: 1.7; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .header-top { padding: 10px 20px; flex-wrap: wrap; gap: 10px; }
            .container { padding: 20px; }
            nav { padding: 0 20px; }
            .stats-bar { grid-template-columns: repeat(2,1fr); }
            .form-row, .form-row-3 { grid-template-columns: 1fr; }
            .zone-info-grid { grid-template-columns: 1fr; }
            .credits-bar { flex-direction: column; gap: 5px; text-align: center; }
        }
    </style>
</head>
<body>

<!-- ======= HEADER ======= -->
<header>
    <div class="header-top">
        <div class="logo-section">
            <div class="scp-logo" onclick="navigateTo('accueil')">SCP</div>
            <div class="header-title">
                <h1>FONDATION SCP</h1>

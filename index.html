<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondation SCP — Site-95 Wiki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rouge: #8b0000;
            --rouge-vif: #cc0000;
            --noir: #0a0a0a;
            --gris-fonce: #111111;
            --gris-moyen: #1a1a1a;
            --gris-clair: #2a2a2a;
            --texte: #c8c8c8;
            --texte-clair: #e8e8e8;
            --accent: #ff3333;
            --vert: #00ff41;
            --jaune: #ffd700;
            --bleu: #4488ff;
            --violet: #8844ff;
        }

        body {
            background: var(--noir);
            color: var(--texte);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ====== PAGES ====== */
        .page { display: none; min-height: calc(100vh - 200px); }
        .page.active { display: block; }

        /* ====== SCROLLBAR ====== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--noir); }
        ::-webkit-scrollbar-thumb { background: var(--rouge); border-radius: 3px; }

        /* ====== HEADER ====== */
        header {
            background: linear-gradient(180deg, #0d0000 0%, #0a0a0a 100%);
            border-bottom: 2px solid var(--rouge);
            position: sticky; top: 0; z-index: 500;
            box-shadow: 0 4px 30px rgba(139,0,0,0.5);
        }

        .header-main {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 15px 50px;
        }

        .logo-wrap { display: flex; align-items: center; gap: 18px; cursor: pointer; }

        .logo-circle {
            width: 65px; height: 65px;
            border-radius: 50%;
            border: 3px solid var(--rouge);
            background: radial-gradient(circle at 35% 35%, #2a0000, #000);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold;
            color: var(--rouge-vif);
            animation: logoGlow 4s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes logoGlow {
            0%,100% { box-shadow: 0 0 8px var(--rouge), inset 0 0 8px rgba(139,0,0,0.3); }
            50% { box-shadow: 0 0 25px var(--rouge), 0 0 50px rgba(139,0,0,0.2), inset 0 0 15px rgba(139,0,0,0.4); }
        }

        .logo-text h1 { font-size: 22px; letter-spacing: 5px; color: var(--texte-clair); }
        .logo-text .sub { font-size: 10px; color: var(--rouge-vif); letter-spacing: 6px; margin-top: 3px; }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .clock-display { text-align: right; font-size: 10px; color: rgba(200,200,200,0.3); letter-spacing: 1px; }
        .clock-display .time { font-size: 16px; color: rgba(200,200,200,0.6); display: block; }

        .admin-zone {
            display: flex; align-items: center; gap: 8px;
            border-left: 1px solid rgba(139,0,0,0.3);
            padding-left: 12px;
        }

        .btn-admin {
            padding: 7px 16px; font-size: 10px;
            letter-spacing: 2px; font-family: inherit;
            cursor: pointer; background: transparent;
            border: 1px solid rgba(139,0,0,0.5);
            color: rgba(200,200,200,0.5);
            transition: all 0.3s; text-transform: uppercase;
        }
        .btn-admin:hover { border-color: var(--rouge-vif); color: var(--accent); }
        .btn-admin.active { border-color: var(--vert); color: var(--vert); }

        /* ====== NAVIGATION ====== */
        .nav-bar {
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(139,0,0,0.2);
            padding: 0 50px;
            display: flex;
            overflow-x: auto;
        }
        .nav-bar::-webkit-scrollbar { height: 2px; }

        .nav-item {
            display: flex; align-items: center; gap: 7px;
            padding: 11px 20px; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase;
            color: rgba(200,200,200,0.5);
            cursor: pointer; white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.25s;
            user-select: none;
        }
        .nav-item:hover { color: var(--texte-clair); background: rgba(139,0,0,0.1); }
        .nav-item.active { color: var(--accent); border-bottom-color: var(--rouge-vif); background: rgba(139,0,0,0.15); }
        .nav-item .nav-icon { font-size: 13px; }

        /* ====== TICKER ====== */
        .ticker {
            background: var(--rouge); padding: 5px 0;
            overflow: hidden; white-space: nowrap;
            border-bottom: 1px solid var(--rouge-vif);
        }
        .ticker span {
            display: inline-block;
            animation: tickAnim 40s linear infinite;
            font-size: 10px; letter-spacing: 2px; color: #fff;
            padding-left: 100%;
        }
        @keyframes tickAnim { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }

        /* ====== CONTAINER ====== */
        .container { max-width: 1350px; margin: 0 auto; padding: 35px 50px; }
        .container-sm { max-width: 900px; margin: 0 auto; padding: 35px 50px; }

        /* ====== SECTION TITLE ====== */
        .sec-title {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 25px; padding-bottom: 12px;
            border-bottom: 1px solid rgba(139,0,0,0.3);
        }
        .sec-title h2 { font-size: 14px; color: var(--texte-clair); letter-spacing: 5px; text-transform: uppercase; }
        .sec-title .sec-line { flex:1; height:1px; background: linear-gradient(90deg, rgba(139,0,0,0.4), transparent); }
        .sec-title .sec-count { font-size: 10px; color: rgba(200,200,200,0.3); letter-spacing: 2px; }

        /* ====== BUTTONS ====== */
        .btn {
            padding: 8px 20px; font-size: 11px;
            letter-spacing: 2px; font-family: inherit;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn-red { background: var(--rouge); border: 1px solid var(--rouge-vif); color: #fff; }
        .btn-red:hover { background: var(--rouge-vif); box-shadow: 0 0 15px rgba(204,0,0,0.4); }
        .btn-ghost { background: transparent; border: 1px solid rgba(200,200,200,0.15); color: var(--texte); }
        .btn-ghost:hover { border-color: var(--rouge); color: var(--accent); }
        .btn-green { background: transparent; border: 1px solid #005500; color: #00cc00; }
        .btn-green:hover { background: rgba(0,100,0,0.2); }
        .btn-danger { background: transparent; border: 1px solid #550000; color: #ff4444; }
        .btn-danger:hover { background: rgba(100,0,0,0.2); }
        .btn-sm { padding: 4px 12px; font-size: 10px; }
        .btn-xs { padding: 2px 8px; font-size: 9px; }

        /* ====== FORM ====== */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--rouge-vif); margin-bottom: 6px; text-transform: uppercase; }
        .form-control {
            width: 100%; padding: 10px 14px;
            background: #0d0d0d; border: 1px solid rgba(139,0,0,0.3);
            color: var(--texte-clair); font-family: inherit; font-size: 12px;
            transition: border-color 0.3s; outline: none;
        }
        .form-control:focus { border-color: var(--rouge-vif); box-shadow: 0 0 10px rgba(204,0,0,0.15); }
        .form-control option { background: #111; }
        textarea.form-control { resize: vertical; min-height: 90px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

        /* ====== MODAL ====== */
        .modal-bg {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.88); z-index: 9000;
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-bg.open { display: flex; }
        .modal-box {
            background: var(--gris-moyen);
            border: 1px solid var(--rouge);
            border-top: 4px solid var(--rouge-vif);
            width: 100%; max-width: 650px;
            max-height: 88vh; overflow-y: auto;
            padding: 30px; position: relative;
        }
        .modal-box h2 { font-size: 15px; letter-spacing: 3px; color: var(--texte-clair); margin-bottom: 20px; }
        .modal-close {
            position: absolute; top: 14px; right: 14px;
            background: none; border: 1px solid rgba(255,255,255,0.15);
            color: var(--texte); cursor: pointer;
            padding: 4px 12px; font-family: inherit; font-size: 12px;
            transition: all 0.2s;
        }
        .modal-close:hover { border-color: var(--rouge); color: var(--accent); }

        /* ====== BADGES ====== */
        .badge { display: inline-block; padding: 2px 9px; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
        .b-safe { background: #002200; color: #00ee00; border: 1px solid #004400; }
        .b-euclid { background: #222200; color: #eeee00; border: 1px solid #444400; }
        .b-keter { background: #220000; color: #ee4444; border: 1px solid #440000; }
        .b-thaumiel { background: #000022; color: #4444ee; border: 1px solid #000044; }
        .b-apollyon { background: #1a0000; color: #ff0000; border: 1px solid #ff0000; }
        .b-neutralized { background: #1a1a1a; color: #888; border: 1px solid #333; }
        .b-n1 { background: rgba(0,80,0,0.3); color: #00cc00; border: 1px solid #004400; }
        .b-n2 { background: rgba(0,50,80,0.3); color: #00aaff; border: 1px solid #003355; }
        .b-n3 { background: rgba(80,60,0,0.3); color: #ffcc00; border: 1px solid #554400; }
        .b-n4 { background: rgba(80,30,0,0.3); color: #ff8800; border: 1px solid #553300; }
        .b-n5 { background: rgba(80,0,0,0.3); color: #ff4444; border: 1px solid #550000; }

        /* ====== TOAST ====== */
        #toast {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--gris-moyen);
            border: 1px solid rgba(139,0,0,0.5);
            border-left: 4px solid var(--rouge-vif);
            padding: 12px 20px; font-size: 12px;
            z-index: 99999; opacity: 0;
            transform: translateY(15px);
            transition: all 0.35s; pointer-events: none;
            max-width: 320px;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.ok { border-left-color: #00cc00; }
        #toast.warn { border-left-color: #ffcc00; }
        #toast.err { border-left-color: #ff4444; }

        /* ============================
           PAGE — ACCUEIL
        ============================= */
        .home-hero {
            background: linear-gradient(135deg, rgba(139,0,0,0.12), rgba(0,0,0,0.6));
            border: 1px solid rgba(139,0,0,0.25);
            border-top: 3px solid var(--rouge-vif);
            padding: 45px 50px; margin-bottom: 30px;
            position: relative; overflow: hidden;
        }
        .home-hero::after {
            content: 'SITE-95';
            position: absolute; right: 30px; top: 50%;
            transform: translateY(-50%);
            font-size: 90px; font-weight: bold;
            color: rgba(139,0,0,0.05); pointer-events: none;
            letter-spacing: 10px;
        }
        .home-hero h2 { font-size: 28px; letter-spacing: 7px; color: var(--texte-clair); margin-bottom: 10px; }
        .home-hero .sub { font-size: 12px; color: var(--rouge-vif); letter-spacing: 4px; margin-bottom: 20px; }
        .home-hero p { font-size: 12px; line-height: 1.9; max-width: 680px; opacity: 0.75; }
        .home-hero .motto {
            display: flex; gap: 0; margin-top: 25px;
            border: 1px solid rgba(139,0,0,0.3);
            width: fit-content;
        }
        .motto-item { padding: 10px 25px; font-size: 11px; letter-spacing: 4px; border-right: 1px solid rgba(139,0,0,0.3); }
        .motto-item:last-child { border-right: none; }
        .motto-item span { color: var(--rouge-vif); display: block; font-size: 18px; margin-bottom: 3px; }

        .home-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 35px; }
        .stat-card { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.15); padding: 18px; text-align: center; transition: all 0.3s; cursor: default; }
        .stat-card:hover { border-color: rgba(204,0,0,0.4); box-shadow: 0 0 15px rgba(139,0,0,0.15); }
        .stat-card .num { font-size: 30px; font-weight: bold; color: var(--rouge-vif); }
        .stat-card .lbl { font-size: 9px; color: rgba(200,200,200,0.35); letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }

        .alert-strip {
            background: rgba(139,0,0,0.08);
            border: 1px solid rgba(139,0,0,0.35);
            border-left: 4px solid var(--rouge-vif);
            padding: 13px 18px; margin-bottom: 30px;
            display: flex; align-items: center; gap: 15px;
        }
        .alert-strip .al-icon { font-size: 22px; flex-shrink: 0; }
        .alert-strip .al-title { font-size: 11px; color: var(--accent); letter-spacing: 2px; margin-bottom: 3px; }
        .alert-strip .al-text { font-size: 11px; opacity: 0.7; }

        .home-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .home-card { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.15); overflow: hidden; }
        .home-card-head { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
        .home-card-head h3 { font-size: 11px; color: var(--texte-clair); letter-spacing: 3px; text-transform: uppercase; }
        .home-card-body { padding: 18px; }

        .quick-link {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer; transition: all 0.2s;
        }
        .quick-link:last-child { border-bottom: none; }
        .quick-link:hover { padding-left: 5px; }
        .quick-link .ql-icon { font-size: 18px; width: 35px; text-align: center; }
        .quick-link .ql-title { font-size: 12px; color: var(--texte-clair); margin-bottom: 2px; }
        .quick-link .ql-sub { font-size: 10px; color: rgba(200,200,200,0.4); }
        .quick-link .ql-arrow { margin-left: auto; color: var(--rouge-vif); font-size: 14px; }

        .activity-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .activity-item:last-child { border-bottom: none; }
        .act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
        .act-text { font-size: 11px; opacity: 0.7; line-height: 1.5; }
        .act-time { font-size: 10px; color: rgba(200,200,200,0.3); margin-top: 3px; }

        /* ============================
           PAGE — PERSONNEL
        ============================= */
        .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 22px; flex-wrap: wrap; }
        .toolbar input, .toolbar select {
            padding: 8px 13px; background: #0d0d0d;
            border: 1px solid rgba(139,0,0,0.3);
            color: var(--texte); font-family: inherit; font-size: 11px;
        }
        .toolbar input:focus, .toolbar select:focus { outline: none; border-color: var(--rouge-vif); }

        .personnel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px,1fr)); gap: 15px; }
        .p-card { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.15); overflow: hidden; transition: all 0.3s; }
        .p-card:hover { border-color: var(--rouge); box-shadow: 0 0 18px rgba(139,0,0,0.2); transform: translateY(-2px); }
        .p-card-head { padding: 14px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.25); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .avatar { width: 46px; height: 46px; border-radius: 50%; background: #0a0000; border: 2px solid rgba(139,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: bold; color: var(--rouge-vif); flex-shrink: 0; }
        .p-name { font-size: 13px; color: var(--texte-clair); margin-bottom: 2px; }
        .p-role { font-size: 10px; color: rgba(200,200,200,0.45); letter-spacing: 1px; }
        .p-card-body { padding: 12px 14px; }
        .p-detail { display: flex; gap: 8px; margin-bottom: 5px; font-size: 11px; }
        .p-key { color: rgba(200,200,200,0.35); min-width: 90px; font-size: 10px; flex-shrink: 0; }
        .p-val { color: var(--texte); }
        .p-card-foot { padding: 9px 14px; border-top: 1px solid rgba(255,255,255,0.04); display: flex; gap: 7px; justify-content: flex-end; background: rgba(0,0,0,0.15); }

        /* ============================
           PAGE — DÉPARTEMENTS
        ============================= */
        .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 18px; }
        .dept-card { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.15); overflow: hidden; transition: border-color 0.3s; }
        .dept-card:hover { border-color: rgba(204,0,0,0.35); }
        .dept-head { padding: 16px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none; }
        .dept-icon-wrap { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .dept-name { font-size: 13px; color: var(--texte-clair); letter-spacing: 1px; margin-bottom: 3px; }
        .dept-code { font-size: 10px; color: rgba(200,200,200,0.35); letter-spacing: 2px; }
        .dept-toggle { margin-left: auto; width: 26px; height: 26px; border: 1px solid rgba(255,255,255,0.1); background: none; color: var(--texte); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.3s; flex-shrink: 0; }
        .dept-body { max-height: 0; overflow: hidden; transition: max-height 0.45s ease, padding 0.3s; border-top: 1px solid rgba(255,255,255,0.04); padding: 0 18px; }
        .dept-body.open { max-height: 700px; padding: 16px 18px 18px; }
        .dept-desc { font-size: 11px; opacity: 0.72; line-height: 1.85; margin-bottom: 14px; }
        .dept-section-title { font-size: 10px; color: var(--rouge-vif); letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; }
        .dept-list { list-style: none; margin-bottom: 14px; }
        .dept-list li { font-size: 11px; opacity: 0.68; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; gap: 8px; }
        .dept-list li::before { content: '›'; color: var(--rouge-vif); font-size: 14px; flex-shrink: 0; }
        .dept-mini-stats { display: flex; gap: 8px; }
        .dms { flex:1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.04); padding: 8px; text-align: center; }
        .dms .dn { font-size: 18px; font-weight: bold; color: var(--rouge-vif); }
        .dms .dl { font-size: 9px; color: rgba(200,200,200,0.3); letter-spacing: 1px; margin-top: 2px; }

        /* ============================
           PAGE — ZONES
        ============================= */
        .zone-tabs { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .zone-tab { padding: 8px 20px; font-size: 11px; letter-spacing: 2px; font-family: inherit; cursor: pointer; background: transparent; border: 1px solid rgba(139,0,0,0.25); color: rgba(200,200,200,0.4); transition: all 0.3s; text-transform: uppercase; }
        .zone-tab:hover, .zone-tab.active { border-color: var(--rouge-vif); color: var(--texte-clair); background: rgba(139,0,0,0.18); }
        .zone-content { display: none; }
        .zone-content.active { display: block; }
        .zone-hero { padding: 28px; margin-bottom: 20px; border-top: 3px solid; position: relative; overflow: hidden; }
        .zone-hero::after { content: attr(data-name); position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 70px; font-weight: bold; opacity: 0.04; pointer-events: none; letter-spacing: 5px; }
        .zone-hero h2 { font-size: 20px; letter-spacing: 6px; margin-bottom: 6px; }
        .zone-hero .z-sub { font-size: 10px; letter-spacing: 4px; opacity: 0.6; margin-bottom: 12px; }
        .zone-hero p { font-size: 11px; opacity: 0.72; line-height: 1.85; max-width: 680px; }
        .zone-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
        .zone-box { background: rgba(0,0,0,0.35); border-left: 3px solid; padding: 15px; }
        .zone-box h4 { font-size: 10px; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }
        .zone-box p, .zone-box li { font-size: 11px; opacity: 0.68; line-height: 1.8; }
        .zone-box ul { padding-left: 15px; }
        .zone-stat-row { display: flex; gap: 10px; margin-top: 16px; }
        .zs { flex:1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.04); padding: 12px; text-align: center; }
        .zs .zn { font-size: 22px; font-weight: bold; }
        .zs .zl { font-size: 9px; color: rgba(200,200,200,0.3); letter-spacing: 2px; margin-top: 3px; }

        /* ============================
           PAGE — OBJETS SCP
        ============================= */
        .scp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 18px; }
        .scp-card { background: var(--gris-moyen); border: 1px solid rgba(139,0,0,0.15); border-top: 3px solid var(--rouge); padding: 20px; transition: all 0.3s; cursor: pointer; }
        .scp-card:hover { border-color: rgba(204,0,0,0.5); box-shadow: 0 0 20px rgba(139,0,0,0.2); transform: translateY(-2px); }
        .scp-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .scp-num { font-size: 22px; font-weight: bold; color: var(--rouge-vif); letter-spacing: 2px; }
        .scp-card h3 { font-size: 13px; color: var(--texte-clair); margin

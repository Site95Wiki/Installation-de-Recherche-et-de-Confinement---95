<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondation SCP — Site-95</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --rouge:#8b0000;--rouge-vif:#cc0000;--noir:#0a0a0a;
            --gris-fonce:#111;--gris-moyen:#1a1a1a;--texte:#c8c8c8;
            --texte-clair:#e8e8e8;--accent:#ff3333;--vert:#00ff41;--jaune:#ffd700;
        }
        body{background:var(--noir);color:var(--texte);font-family:'Courier New',monospace;min-height:100vh}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:var(--rouge)}
        .page{display:none;min-height:calc(100vh - 160px)}.page.active{display:block}

        /* HEADER */
        header{background:linear-gradient(180deg,#0d0000,#0a0a0a);border-bottom:2px solid var(--rouge);position:sticky;top:0;z-index:999;box-shadow:0 4px 20px rgba(139,0,0,.4)}
        .header-main{display:flex;align-items:center;justify-content:space-between;padding:12px 40px}
        .logo-wrap{display:flex;align-items:center;gap:15px;cursor:pointer}
        .logo-circle{width:58px;height:58px;border-radius:50%;border:3px solid var(--rouge);background:radial-gradient(circle at 35% 35%,#2a0000,#000);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:var(--rouge-vif);animation:glow 4s ease-in-out infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 8px var(--rouge)}50%{box-shadow:0 0 25px var(--rouge),0 0 50px rgba(139,0,0,.2)}}
        .logo-text h1{font-size:20px;letter-spacing:5px;color:var(--texte-clair)}
        .logo-text .sub{font-size:10px;color:var(--rouge-vif);letter-spacing:5px;margin-top:2px}
        .header-right{display:flex;align-items:center;gap:15px}
        .clock{font-size:10px;color:rgba(200,200,200,.3);text-align:right}
        .clock .time{font-size:15px;color:rgba(200,200,200,.5);display:block}
        .btn-admin{padding:6px 14px;font-size:10px;letter-spacing:2px;font-family:inherit;cursor:pointer;background:transparent;border:1px solid rgba(139,0,0,.5);color:rgba(200,200,200,.5);transition:all .3s;text-transform:uppercase}
        .btn-admin:hover{border-color:var(--rouge-vif);color:var(--accent)}
        .btn-admin.on{border-color:var(--vert);color:var(--vert)}

        /* NAV */
        .nav-bar{background:rgba(0,0,0,.5);border-top:1px solid rgba(139,0,0,.2);padding:0 40px;display:flex;overflow-x:auto}
        .nav-bar::-webkit-scrollbar{height:2px}
        .nav-item{display:flex;align-items:center;gap:7px;padding:10px 18px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,200,200,.45);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .25s;user-select:none}
        .nav-item:hover{color:var(--texte-clair);background:rgba(139,0,0,.1)}
        .nav-item.active{color:var(--accent);border-bottom-color:var(--rouge-vif);background:rgba(139,0,0,.12)}

        /* TICKER */
        .ticker{background:var(--rouge);padding:5px 0;overflow:hidden;white-space:nowrap}
        .ticker span{display:inline-block;padding-left:100%;animation:tick 40s linear infinite;font-size:10px;letter-spacing:2px;color:#fff}
        @keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

        /* LAYOUT */
        .container{max-width:1350px;margin:0 auto;padding:30px 40px}

        /* SECTION TITLE */
        .sec-title{display:flex;align-items:center;gap:15px;margin-bottom:22px;padding-bottom:10px;border-bottom:1px solid rgba(139,0,0,.3)}
        .sec-title h2{font-size:13px;color:var(--texte-clair);letter-spacing:5px;text-transform:uppercase}
        .sec-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(139,0,0,.4),transparent)}
        .sec-count{font-size:10px;color:rgba(200,200,200,.25);letter-spacing:2px}

        /* BUTTONS */
        .btn{padding:7px 18px;font-size:10px;letter-spacing:2px;font-family:inherit;cursor:pointer;transition:all .3s;text-transform:uppercase;border:none}
        .btn-red{background:var(--rouge);border:1px solid var(--rouge-vif);color:#fff}.btn-red:hover{background:var(--rouge-vif)}
        .btn-ghost{background:transparent;border:1px solid rgba(200,200,200,.15);color:var(--texte)}.btn-ghost:hover{border-color:var(--rouge);color:var(--accent)}
        .btn-green{background:transparent;border:1px solid #005500;color:#00cc00}.btn-green:hover{background:rgba(0,80,0,.2)}
        .btn-del{background:transparent;border:1px solid #550000;color:#ff4444}.btn-del:hover{background:rgba(80,0,0,.2)}
        .btn-sm{padding:3px 10px;font-size:9px}

        /* FORM */
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:10px;letter-spacing:2px;color:var(--rouge-vif);margin-bottom:5px;text-transform:uppercase}
        .form-ctrl{width:100%;padding:9px 12px;background:#0d0d0d;border:1px solid rgba(139,0,0,.3);color:var(--texte-clair);font-family:inherit;font-size:11px;outline:none;transition:border-color .3s}
        .form-ctrl:focus{border-color:var(--rouge-vif);box-shadow:0 0 8px rgba(204,0,0,.15)}
        .form-ctrl option{background:#111}
        textarea.form-ctrl{resize:vertical;min-height:80px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
        .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

        /* MODAL */
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;justify-content:center;align-items:center;padding:20px}
        .modal-bg.open{display:flex}
        .modal-box{background:var(--gris-moyen);border:1px solid var(--rouge);border-top:4px solid var(--rouge-vif);width:100%;max-width:620px;max-height:88vh;overflow-y:auto;padding:28px;position:relative}
        .modal-box h2{font-size:14px;letter-spacing:3px;color:var(--texte-clair);margin-bottom:18px}
        .modal-close{position:absolute;top:13px;right:13px;background:none;border:1px solid rgba(255,255,255,.15);color:var(--texte);cursor:pointer;padding:4px 11px;font-family:inherit;font-size:11px;transition:all .2s}
        .modal-close:hover{border-color:var(--rouge);color:var(--accent)}

        /* BADGES */
        .badge{display:inline-block;padding:2px 8px;font-size:9px;font-weight:bold;letter-spacing:1px}
        .b-safe{background:#002200;color:#00ee00;border:1px solid #004400}
        .b-euclid{background:#222200;color:#eeee00;border:1px solid #444400}
        .b-keter{background:#220000;color:#ee4444;border:1px solid #440000}
        .b-thaumiel{background:#000022;color:#4444ee;border:1px solid #000044}
        .b-apollyon{background:#1a0000;color:#ff0000;border:1px solid #ff0000}
        .b-neutralized{background:#1a1a1a;color:#888;border:1px solid #333}
        .b-n1{background:rgba(0,80,0,.3);color:#00cc00;border:1px solid #004400}
        .b-n2{background:rgba(0,50,80,.3);color:#00aaff;border:1px solid #003355}
        .b-n3{background:rgba(80,60,0,.3);color:#ffcc00;border:1px solid #554400}
        .b-n4{background:rgba(80,30,0,.3);color:#ff8800;border:1px solid #553300}
        .b-n5{background:rgba(80,0,0,.3);color:#ff4444;border:1px solid #550000}

        /* TOAST */
        #toast{position:fixed;bottom:25px;right:25px;background:var(--gris-moyen);border:1px solid rgba(139,0,0,.5);border-left:4px solid var(--rouge-vif);padding:12px 20px;font-size:11px;z-index:99999;opacity:0;transform:translateY(15px);transition:all .35s;pointer-events:none;max-width:300px}
        #toast.show{opacity:1;transform:translateY(0)}
        #toast.ok{border-left-color:#00cc00}
        #toast.warn{border-left-color:#ffcc00}
        #toast.err{border-left-color:#ff4444}

        /* PAGE ACCUEIL */
        .home-hero{background:linear-gradient(135deg,rgba(139,0,0,.1),rgba(0,0,0,.5));border:1px solid rgba(139,0,0,.25);border-top:3px solid var(--rouge-vif);padding:40px;margin-bottom:28px;position:relative;overflow:hidden}
        .home-hero::after{content:'SITE-95';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:85px;font-weight:bold;color:rgba(139,0,0,.05);pointer-events:none;letter-spacing:10px}
        .home-hero h2{font-size:26px;letter-spacing:7px;color:var(--texte-clair);margin-bottom:8px}
        .home-hero .sub{font-size:11px;color:var(--rouge-vif);letter-spacing:4px;margin-bottom:18px}
        .home-hero p{font-size:12px;line-height:1.9;max-width:650px;opacity:.75}
        .motto-row{display:flex;width:fit-content;border:1px solid rgba(139,0,0,.3);margin-top:22px}
        .motto-cell{padding:10px 24px;font-size:11px;letter-spacing:4px;border-right:1px solid rgba(139,0,0,.3)}
        .motto-cell:last-child{border-right:none}
        .motto-cell span{color:var(--rouge-vif);display:block;font-size:16px;margin-bottom:2px}
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
        .stat-box{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);padding:16px;text-align:center;transition:all .3s}
        .stat-box:hover{border-color:rgba(204,0,0,.35)}
        .stat-box .num{font-size:28px;font-weight:bold;color:var(--rouge-vif)}
        .stat-box .lbl{font-size:9px;color:rgba(200,200,200,.3);letter-spacing:2px;margin-top:4px}
        .alert-bar{background:rgba(139,0,0,.08);border:1px solid rgba(139,0,0,.35);border-left:4px solid var(--rouge-vif);padding:12px 18px;margin-bottom:28px;display:flex;align-items:center;gap:14px}
        .alert-bar .ico{font-size:20px}
        .alert-bar .al-title{font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:3px}
        .alert-bar .al-txt{font-size:11px;opacity:.7}
        .home-2col{display:grid;grid-template-columns:2fr 1fr;gap:22px}
        .hcard{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);overflow:hidden}
        .hcard-head{padding:12px 16px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center}
        .hcard-head h3{font-size:11px;color:var(--texte-clair);letter-spacing:3px}
        .hcard-body{padding:16px}
        .quick-link{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .2s}
        .quick-link:last-child{border-bottom:none}
        .quick-link:hover{padding-left:6px}
        .ql-icon{font-size:18px;width:32px;text-align:center}
        .ql-title{font-size:12px;color:var(--texte-clair);margin-bottom:2px}
        .ql-sub{font-size:10px;color:rgba(200,200,200,.35)}
        .ql-arrow{margin-left:auto;color:var(--rouge-vif)}
        .act-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}
        .act-item:last-child{border-bottom:none}
        .act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
        .act-txt{font-size:11px;opacity:.65;line-height:1.5}
        .act-time{font-size:9px;color:rgba(200,200,200,.25);margin-top:3px}

        /* PERSONNEL */
        .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
        .p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
        .p-card{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);overflow:hidden;transition:all .3s}
        .p-card:hover{border-color:var(--rouge);box-shadow:0 0 15px rgba(139,0,0,.18);transform:translateY(-2px)}
        .p-head{padding:13px;display:flex;align-items:center;gap:11px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.04)}
        .avatar{width:45px;height:45px;border-radius:50%;background:#0a0000;border:2px solid rgba(139,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:var(--rouge-vif);flex-shrink:0}
        .p-name{font-size:13px;color:var(--texte-clair);margin-bottom:2px}
        .p-role{font-size:10px;color:rgba(200,200,200,.4);letter-spacing:1px}
        .p-body{padding:11px 13px}
        .p-row{display:flex;gap:8px;margin-bottom:5px;font-size:11px;align-items:flex-start}
        .p-key{color:rgba(200,200,200,.3);min-width:85px;font-size:10px;flex-shrink:0}
        .p-val{color:var(--texte)}
        .p-foot{padding:8px 13px;border-top:1px solid rgba(255,255,255,.04);display:flex;gap:7px;justify-content:flex-end;background:rgba(0,0,0,.15)}

        /* DEPARTEMENTS */
        .dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
        .dept-card{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);overflow:hidden;transition:border-color .3s}
        .dept-card:hover{border-color:rgba(204,0,0,.35)}
        .dept-head{padding:15px 17px;display:flex;align-items:center;gap:13px;cursor:pointer;user-select:none}
        .dept-ico{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
        .dept-name{font-size:13px;color:var(--texte-clair);letter-spacing:1px;margin-bottom:3px}
        .dept-code{font-size:10px;color:rgba(200,200,200,.3);letter-spacing:2px}
        .dept-toggle{margin-left:auto;width:25px;height:25px;border:1px solid rgba(255,255,255,.1);background:none;color:var(--texte);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .3s}
        .dept-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;border-top:1px solid rgba(255,255,255,.04);padding:0 17px}
        .dept-body.open{max-height:900px;padding:14px 17px 17px}
        .dept-desc{font-size:11px;opacity:.72;line-height:1.85;margin-bottom:12px}
        .dept-sub-title{font-size:10px;color:var(--rouge-vif);letter-spacing:3px;margin-bottom:7px}
        .dept-ul{list-style:none;margin-bottom:12px}
        .dept-ul li{font-size:11px;opacity:.65;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);display:flex;align-items:center;gap:8px}
        .dept-ul li::before{content:'›';color:var(--rouge-vif);font-size:13px}
        .dept-stats{display:flex;gap:8px}
        .ds{flex:1;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04);padding:8px;text-align:center}
        .ds .dn{font-size:17px;font-weight:bold;color:var(--rouge-vif)}
        .ds .dl{font-size:9px;color:rgba(200,200,200,.3);letter-spacing:1px;margin-top:2px}

        /* ZONES */
        .zone-tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
        .zone-tab{padding:7px 18px;font-size:11px;letter-spacing:2px;font-family:inherit;cursor:pointer;background:transparent;border:1px solid rgba(139,0,0,.25);color:rgba(200,200,200,.4);transition:all .3s;text-transform:uppercase}
        .zone-tab:hover,.zone-tab.active{border-color:var(--rouge-vif);color:var(--texte-clair);background:rgba(139,0,0,.18)}
        .zone-panel{display:none}.zone-panel.active{display:block}
        .zone-hero{padding:25px;margin-bottom:18px;border-top:3px solid;position:relative;overflow:hidden}
        .zone-hero::after{content:attr(data-nom);position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:65px;font-weight:bold;opacity:.04;pointer-events:none;letter-spacing:5px}
        .zone-hero h2{font-size:19px;letter-spacing:6px;margin-bottom:5px}
        .zone-hero .z-sub{font-size:10px;letter-spacing:4px;opacity:.55;margin-bottom:11px}
        .zone-hero p{font-size:11px;opacity:.7;line-height:1.85;max-width:650px}
        .zone-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
        .zone-box{background:rgba(0,0,0,.35);border-left:3px solid;padding:14px}
        .zone-box h4{font-size:10px;letter-spacing:3px;margin-bottom:9px;text-transform:uppercase}
        .zone-box p,.zone-box li{font-size:11px;opacity:.67;line-height:1.8}
        .zone-box ul{padding-left:14px}
        .zone-stat-row{display:flex;gap:10px;margin-top:14px}
        .zs{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.04);padding:11px;text-align:center}
        .zs .zn{font-size:21px;font-weight:bold}
        .zs .zl{font-size:9px;color:rgba(200,200,200,.3);letter-spacing:2px;margin-top:3px}

        /* SCP */
        .scp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
        .scp-card{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);border-top:3px solid var(--rouge);padding:18px;transition:all .3s;cursor:pointer}
        .scp-card:hover{border-color:rgba(204,0,0,.5);box-shadow:0 0 18px rgba(139,0,0,.2);transform:translateY(-2px)}
        .scp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
        .scp-num{font-size:20px;font-weight:bold;color:var(--rouge-vif);letter-spacing:2px}
        .scp-card h3{font-size:13px;color:var(--texte-clair);margin-bottom:6px}
        .scp-card p{font-size:11px;opacity:.65;line-height:1.6;margin-bottom:12px}
        .scp-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,.05);padding-top:9px;font-size:10px;color:rgba(200,200,200,.3)}

        /* PROTOCOLES */
        .proto-card{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);border-left:4px solid var(--rouge);padding:18px;margin-bottom:13px;transition:all .3s}
        .proto-card:hover{border-left-color:var(--rouge-vif)}
        .proto-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .proto-head h3{font-size:13px;color:var(--texte-clair);letter-spacing:2px}
        .proto-card p{font-size:11px;opacity:.68;line-height:1.75}
        .proto-meta{display:flex;gap:15px;margin-top:10px;font-size:10px;color:rgba(200,200,200,.3)}

        /* INCIDENTS */
        .inc-card{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);border-left:4px solid;padding:16px;margin-bottom:12px}
        .inc-card.critique{border-left-color:#ff0000}
        .inc-card.majeur{border-left-color:#ff8800}
        .inc-card.mineur{border-left-color:#ffcc00}
        .inc-card.resolu{border-left-color:#00cc00}
        .inc-card.investigation{border-left-color:#4488ff}
        .inc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
        .inc-head h3{font-size:13px;color:var(--texte-clair);letter-spacing:1px}
        .inc-card p{font-size:11px;opacity:.68;line-height:1.75}
        .inc-meta{display:flex;gap:15px;margin-top:10px;font-size:10px;color:rgba(200,200,200,.3);flex-wrap:wrap}

        /* CREDITS */
        .credits-wrap{max-width:800px;margin:0 auto}
        .credit-card{background:var(--gris-moyen);border:1px solid rgba(139,0,0,.15);border-top:3px solid var(--rouge);padding:30px;margin-bottom:20px;text-align:center}
        .credit-card .crown{font-size:40px;margin-bottom:10px}
        .credit-card h3{font-size:16px;letter-spacing:4px;color:var(--texte-clair);margin-bottom:5px}
        .credit-card .username{font-size:13px;color:var(--rouge-vif);letter-spacing:3px;margin-bottom:8px}
        .credit-card p{font-size:11px;opacity:.6;line-height:1.8}
        .credit-tag{display:inline-block;padding:3px 12px;font-size:10px;letter-spacing:2px;margin-top:8px}

        /* FICHE DETAIL */
        .fiche-header{display:flex;align-items:center;gap:20px;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid rgba(139,0,0,.3)}
        .fiche-avatar{width:70px;height:70px;border-radius:50%;background:#0a0000;border:3px solid var(--rouge);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:var(--rouge-vif);flex-shrink:0}
        .fiche-section{margin-bottom:16px}
        .fiche-section h4{font-size:10px;color:var(--rouge-vif);letter-spacing:3px;margin-bottom:8px;text-transform:uppercase}
        .fiche-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
        .fiche-key{color:rgba(200,200,200,.4);min-width:130px;flex-shrink:0}
        .fiche-val{color:var(--texte-clair)}
        .redacted{background:#000;color:#000;padding:0 8px;cursor:default;user-select:none}

        /* EMPTY STATE */
        .empty{text-align:center;padding:60px 20px;color:rgba(200,200,200,.25);font-size:12px;letter-spacing:3px}

        /* FOOTER */
        footer{background:rgba(0,0,0,.5);border-top:1px solid rgba(139,0,0,.2);padding:12px 40px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:rgba(200,200,200,.2);letter-spacing:1px;margin-top:40px}
